version: "2"

run:
  timeout: 10m
  modules-download-mode: vendor

linters:
  default: none
  enable:
    - errcheck
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - staticcheck # includes gosimple
    - unconvert
    - unused

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    lll:
      line-length: 160
      tab-width: 1
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST1003"
    misspell:
      locale: US
      ignore-words:
        - cancelled
        - cancelling
    gocritic:
      enabled-checks:
        - appendCombine
        - boolExprSimplify
        - commentedOutImport
        - docStub
        - emptyFallthrough
        - equalFold
        - hexLiteral
        - indexAlloc
        - initClause
        - methodExprCall
        - nilValReturn
        - rangeExprCopy
        - stringXbytes
        - typeAssertChain
        - typeUnparen
        - unnecessaryBlock
        - weakCond

  exclusions:
    presets:
      - comments
      - std-error-handling
    generated: strict
    rules:
      - text: "composite literal uses unkeyed fields"
        linters: [govet]
      - path: _test\.go$|^test/|^tests/|^samples/
        linters:
          - errcheck
          - goconst
          - gosec
    paths:
      - genfiles$
      - bindata$
      - ".*\\.pb\\.go"
      - ".*\\.gen\\.go"

formatters:
  enable:
    - gofmt
    - goimports
    - gci

  settings:
    goimports:
      local-prefixes: open-cluster-management.io
    gci:
      sections:
        - standard
        - default
        - prefix(open-cluster-management.io)
        - prefix(open-cluster-management.io/ocm)
      skip-generated: true
      custom-order: true
