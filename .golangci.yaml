version: "2"

run:
  timeout: 20m
  modules-download-mode: vendor
  concurrency: 2

linters:
  default: none
  enable:
    - unused
    - errcheck
    - goconst
    - gocritic
    - gosec
    - staticcheck
    - govet
    - ineffassign
    - lll
    - misspell
    - unconvert

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    staticcheck:
      checks:
        - "S*"
    misspell:
      locale: US
      ignore-rules:
        - cancelled
        - cancelling
    lll:
      line-length: 160
      tab-width: 1
    gocritic:
      enabled-checks:
        - appendCombine
        - boolExprSimplify
        - commentedOutImport
        - docStub
        - emptyFallthrough
        - equalFold
        - hexLiteral
        - indexAlloc
        - initClause
        - methodExprCall
        - nilValReturn
        - rangeExprCopy
        - stringXbytes
        - typeAssertChain
        - typeUnparen
        - unnecessaryBlock
        - weakCond

  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go$|^tests/|^samples/
        linters:
          - errcheck
          - goconst
      - path: _test\.go$|^test/|/testing/
        linters:
          - gosec
      - text: "composite literal uses unkeyed fields"
        linters:
          - govet
    paths:
      - genfiles$
      - vendor$
      - bindata$
      - ".*\\.pb\\.go"
      - ".*\\.gen\\.go"
    generated: strict

formatters:
  enable:
    - gofmt
    - goimports
    - gci

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(open-cluster-management.io)
        - prefix(open-cluster-management.io/ocm)
      custom-order: true

  exclusions:
    generated: strict
