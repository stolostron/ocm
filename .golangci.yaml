version: "2"

run:
  concurrency: 10
  timeout: 10m
  modules-download-mode: vendor

linters:
  default: none
  enable:
    - unused
    - errcheck
    - goconst
    - gocritic
    - gosec
    - staticcheck # includes gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - unconvert

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    misspell:
      locale: US
    lll:
      line-length: 160
      tab-width: 1
    gocritic:
      enabled-checks:
        - appendCombine
        - boolExprSimplify
        - commentedOutImport
        - docStub
        - emptyFallthrough
        - equalFold
        - hexLiteral
        - indexAlloc
        - initClause
        - methodExprCall
        - nilValReturn
        - rangeExprCopy
        - stringXbytes
        - typeAssertChain
        - typeUnparen
        - unnecessaryBlock
        - weakCond

  exclusions:
    presets:
      - comments
      - std-error-handling
    generated: strict
    rules:
      - text: "composite literal uses unkeyed fields"
        linters: [govet]
      - linters: [errcheck, goconst]
        path: _test\.go$|^tests/|^samples/
      # Exclude gosec from test files and test helpers
      - linters: [gosec]
        path: _test\.go$|^test/|/testing/
      # Exclude dot imports in test files (common gomega pattern)
      - linters: [staticcheck]
        text: "ST1001"
        path: _test\.go$|^test/
      # Exclude quickfix suggestions
      - linters: [staticcheck]
        text: "^QF"
      # Exclude duplicate import warnings
      - linters: [staticcheck]
        text: "ST1019"
      # Exclude deprecated usage in test files
      - linters: [staticcheck]
        text: "^SA1019"
        path: _test\.go$|^test/
    paths:
      - genfiles$
      - vendor$
      - bindata$

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - open-cluster-management.io
