version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor

linters:
  default: none
  enable:
    - errcheck
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - staticcheck
    - unconvert
    - unused

  settings:
    errcheck:
      check-type-assertions: false
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"
    gocritic:
      enabled-checks:
        # Non-default checks only (default checks are enabled automatically)
        - appendCombine
        - boolExprSimplify
        - commentedOutImport
        - docStub
        - emptyFallthrough
        - equalFold
        - hexLiteral
        - indexAlloc
        - initClause
        - methodExprCall
        - nilValReturn
        - rangeExprCopy
        - stringXbytes
        - typeAssertChain
        - typeUnparen
        - unnecessaryBlock
        - weakCond
    misspell:
      locale: US
      ignore-words:
        - cancelled
        - cancelling
    lll:
      line-length: 160
      tab-width: 1

  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    generated: strict
    rules:
      - linters: [errcheck, goconst, gosec]
        path: _test\.go$|^test/|/testing/|^samples/
      - linters: [govet]
        text: "composite literal uses unkeyed fields"
    paths:
      - genfiles
      - bindata
      - ".*\\.pb\\.go"
      - ".*\\.gen\\.go"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: open-cluster-management.io
